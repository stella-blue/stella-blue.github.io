  <script>
    $(document).ready(function(){  
      $('ul.tabs li').click(function(){
        var tab_id = $(this).attr('data-tab');
        $('ul.tabs li').removeClass('current');
        $('.tab-content').removeClass('current');

        $(this).addClass('current');
        $("#"+tab_id).addClass('current');
      })
    })
    let result = {
      first: 0,
      second: 0,
      third: 0,
      fourth: 0,
    }
    //document.getElementById("tabelem-1-1").onclick = function() {};
    function doAction(a, b){
      var base = "tabelem-";
      var base2 = "<img src = ";
      if(a==1){
        var temp = base.concat("1-");
        var temp2 = temp.concat(b);
        var filename = temp2.concat(".png");
        var temp3 = base2.concat(filename);
        var final = temp3.concat(">");
        document.getElementById('first').innerHTML= final;
        result.first = b;
      }
      if(a==2){
        var temp = base.concat("2-");
        var temp2 = temp.concat(b);
        var filename = temp2.concat(".png");
        var temp3 = base2.concat(filename);
        var final = temp3.concat(">");
        document.getElementById('second').innerHTML= final;
        result.second = b;
      }
      if(a==3){alert("3");}
      if(a==4){alert("4");}
    }
  </script>
